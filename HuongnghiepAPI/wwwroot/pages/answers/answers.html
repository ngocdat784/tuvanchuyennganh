<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đáp án</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f6f8fa; }
        .page-title { font-size: 26px; font-weight: bold; margin-bottom: 25px; }
        .action-btn {
            cursor: pointer; padding: 5px 10px; border-radius: 6px;
            font-size: 14px; color: #fff;
        }
        .btn-edit { background: #0d6efd; }
        .btn-delete { background: #dc3545; }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h2 class="page-title">📝 Quản lý đáp án</h2>
        <button class="btn btn-success" onclick="openAddModal()">+ Thêm đáp án</button>
    </div>

    <!-- ==================== DANH SÁCH ĐÁP ÁN ==================== -->
    <table class="table table-bordered mt-4 table-striped">
        <thead class="table-dark">
            <tr>
                <th style="width:60px;">ID</th>
                <th>Nội dung</th>
                <th>Thuộc câu hỏi</th>
                <th>Thứ tự</th>
                <th style="width:150px;">Hành động</th>
            </tr>
        </thead>
        <tbody id="answerTable"></tbody>
    </table>
</div>

<!-- ========================================================= -->
<!-- 🟢 MODAL THÊM ĐÁP ÁN -->
<!-- ========================================================= -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Thêm đáp án</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label>Nội dung đáp án</label>
                <textarea id="addText" class="form-control"></textarea>

                <label class="mt-2">Câu hỏi</label>
                <select id="addQuestion" class="form-control"></select>

                <label class="mt-2">Thứ tự</label>
                <input id="addOrder" type="number" class="form-control">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button class="btn btn-success" onclick="createAnswer()">Lưu</button>
            </div>

        </div>
    </div>
</div>

<!-- ========================================================= -->
<!-- 🔵 MODAL SỬA ĐÁP ÁN -->
<!-- ========================================================= -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Chỉnh sửa đáp án</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editId">

                <label>Nội dung đáp án</label>
                <textarea id="editText" class="form-control"></textarea>

                <label class="mt-2">Câu hỏi</label>
                <select id="editQuestion" class="form-control"></select>

                <label class="mt-2">Thứ tự</label>
                <input id="editOrder" type="number" class="form-control">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button class="btn btn-primary" onclick="updateAnswer()">Cập nhật</button>
            </div>

        </div>
    </div>
</div>

<!-- ========================================================= -->
<!-- 🔴 MODAL XÓA ĐÁP ÁN -->
<!-- ========================================================= -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Xác nhận xóa</h5>
            </div>

            <div class="modal-body">
                <p>Bạn có chắc chắn muốn xóa đáp án này?</p>
                <strong id="deleteAnswerText"></strong>
                <input type="hidden" id="deleteId">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button class="btn btn-danger" onclick="deleteAnswer()">Xóa</button>
            </div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_A = "http://localhost:5086/api/answers";
const API_Q = "http://localhost:5086/api/questions";

/* ======================================================
   LOAD CÂU HỎI CHO DROPDOWN
====================================================== */
async function loadQuestions(selectId) {
    const res = await fetch(API_Q);
    const list = await res.json();

    const select = document.getElementById(selectId);
    select.innerHTML = "";

    list.forEach(q => {
        select.innerHTML += `<option value="${q.questionId}">${q.text}</option>`;
    });
}

/* ======================================================
   LOAD DANH SÁCH ĐÁP ÁN
====================================================== */
async function loadAnswers() {
    const res = await fetch(API_A);
    const data = await res.json();

    const tbody = document.getElementById("answerTable");
    tbody.innerHTML = "";

    data.forEach(a => {
        tbody.innerHTML += `
            <tr>
                <td>${a.answerId}</td>
                <td>${a.text}</td>
                <td>${a.questionId}</td>
                <td>${a.order}</td>
                <td>
                    <span class="action-btn btn-edit" onclick="openEditModal(${a.answerId})">Sửa</span>
                    <span class="action-btn btn-delete" onclick="openDeleteModal(${a.answerId}, '${a.text.replace(/'/g, "\\'")}')">Xóa</span>
                </td>
            </tr>
        `;
    });
}

loadAnswers();

/* ======================================================
   THÊM ĐÁP ÁN
====================================================== */
async function openAddModal() {
    await loadQuestions("addQuestion");
    new bootstrap.Modal(document.getElementById("addModal")).show();
}

async function createAnswer() {
    const body = {
        text: document.getElementById("addText").value,
        order: Number(document.getElementById("addOrder").value),
        questionId: Number(document.getElementById("addQuestion").value)
    };

    await fetch(API_A, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    loadAnswers();
    bootstrap.Modal.getInstance(document.getElementById("addModal")).hide();
}

/* ======================================================
   SỬA ĐÁP ÁN
====================================================== */
async function openEditModal(id) {
    const res = await fetch(`${API_A}/${id}`);
    const a = await res.json();

    document.getElementById("editId").value = a.answerId;
    document.getElementById("editText").value = a.text;
    document.getElementById("editOrder").value = a.order;

    await loadQuestions("editQuestion");
    document.getElementById("editQuestion").value = a.questionId;

    new bootstrap.Modal(document.getElementById("editModal")).show();
}

async function updateAnswer() {
    const id = Number(document.getElementById("editId").value);

    const body = {
        answerId: id,
        text: document.getElementById("editText").value,
        order: Number(document.getElementById("editOrder").value),
        questionId: Number(document.getElementById("editQuestion").value)
    };

    await fetch(`${API_A}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    loadAnswers();
    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
}

/* ======================================================
   XÓA ĐÁP ÁN
====================================================== */
function openDeleteModal(id, text) {
    document.getElementById("deleteId").value = id;
    document.getElementById("deleteAnswerText").innerText = text;

    new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

async function deleteAnswer() {
    const id = document.getElementById("deleteId").value;

    await fetch(`${API_A}/${id}`, { method: "DELETE" });

    loadAnswers();
    bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
}

</script>

</body>
</html>
