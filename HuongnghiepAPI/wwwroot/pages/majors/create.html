<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thêm ngành học</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { background: #f8f9fa; }
    .form-wrap { max-width: 750px; margin: 30px auto; background: #fff;
                 padding: 25px; border-radius: 10px; 
                 box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  </style>
</head>

<body>

  <div class="container">
    <div class="form-wrap">
      <h3 class="mb-3">Thêm ngành học mới</h3>
      <p class="text-muted mb-4">Nhập đầy đủ thông tin ngành học rồi nhấn lưu.</p>

      <form id="createForm">
        
        <!-- Name -->
        <div class="mb-3">
          <label class="form-label fw-bold">Tên ngành</label>
          <input id="name" class="form-control" placeholder="Ví dụ: Công nghệ thông tin" required />
        </div>

        <!-- Job Category -->
        <div class="mb-3">
          <label class="form-label fw-bold">Danh mục nghề nghiệp</label>
          <input id="jobCategory" class="form-control" placeholder="Ví dụ: Kỹ thuật – Công nghệ" />
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label class="form-label fw-bold">Mô tả</label>
          <textarea id="description" class="form-control" rows="4"
            placeholder="Mô tả tổng quan về ngành học..."></textarea>
        </div>

        <!-- Personality Traits -->
        <div class="mb-3">
          <label class="form-label fw-bold">Tính cách phù hợp (nhập mỗi tính cách cách nhau bằng dấu phẩy)</label>
          <input id="traits" class="form-control" placeholder="VD: Năng động, Tư duy logic, Kiên trì" />
        </div>

        <!-- Career Impacts -->
        <div class="mb-3">
          <label class="form-label fw-bold">Tác động nghề nghiệp (cách nhau bằng dấu phẩy)</label>
          <input id="impacts" class="form-control" placeholder="VD: Nhu cầu việc làm cao, Lương tốt" />
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a href="/majors/index.html" class="btn btn-secondary">← Quay lại</a>
          <button type="submit" class="btn btn-primary">Lưu ngành học</button>
        </div>

      </form>
    </div>
  </div>

  <script>
    const API_URL = "/api/majors";

    document.getElementById("createForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const jobCategory = document.getElementById("jobCategory").value.trim();
      const description = document.getElementById("description").value.trim();
      const traits = document.getElementById("traits").value.trim();
      const impacts = document.getElementById("impacts").value.trim();

      if (!name) {
        alert("Tên ngành không được để trống!");
        return;
      }

      const payload = {
        name,
        description,
        jobCategory,
        personalityTraits: traits ? traits.split(",").map(t => t.trim()) : [],
        careerImpacts: impacts ? impacts.split(",").map(i => i.trim()) : []
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert("Thêm ngành học thành công!");
          window.location.href = "/majors/index.html";
        } else {
          const err = await res.json().catch(() => ({}));
          alert(err.message ?? "Lỗi khi thêm ngành học.");
        }

      } catch (err) {
        console.error(err);
        alert("Không thể kết nối API. Vui lòng kiểm tra server.");
      }
    });
  </script>

</body>
</html>
