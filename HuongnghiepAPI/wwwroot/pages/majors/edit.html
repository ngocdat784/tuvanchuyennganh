<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chỉnh sửa ngành học</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { background: #f8f9fa; }
    .form-wrap { max-width: 750px; margin: 30px auto; background: #fff;
                 padding: 25px; border-radius: 10px; 
                 box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  </style>
</head>

<body>

  <div class="container">
    <div class="form-wrap">
      <h3 class="mb-3">Chỉnh sửa ngành học</h3>
      <p class="text-muted mb-4">Cập nhật thông tin ngành học rồi nhấn lưu.</p>

      <form id="editForm">

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label fw-bold">Tên ngành</label>
          <input id="name" class="form-control" required />
        </div>

        <!-- Job Category -->
        <div class="mb-3">
          <label class="form-label fw-bold">Danh mục nghề nghiệp</label>
          <input id="jobCategory" class="form-control" />
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label class="form-label fw-bold">Mô tả</label>
          <textarea id="description" class="form-control" rows="4"></textarea>
        </div>

        <!-- Personality Traits -->
        <div class="mb-3">
          <label class="form-label fw-bold">Tính cách phù hợp (cách nhau bằng dấu phẩy)</label>
          <input id="traits" class="form-control" />
        </div>

        <!-- Career Impacts -->
        <div class="mb-3">
          <label class="form-label fw-bold">Tác động nghề nghiệp (cách nhau bằng dấu phẩy)</label>
          <input id="impacts" class="form-control" />
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a href="/majors/index.html" class="btn btn-secondary">← Quay lại</a>
          <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
        </div>

      </form>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      alert("Không tìm thấy ID ngành!");
      window.location.href = "/majors/index.html";
    }

    const API_URL = `/api/majors/${id}`;

    // Load thông tin ngành
    async function loadMajor() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("Không tải được dữ liệu");

        const data = await res.json();

        // Gán vào form
        document.getElementById("name").value = data.name ?? "";
        document.getElementById("jobCategory").value = data.jobCategory ?? "";
        document.getElementById("description").value = data.description ?? "";

        document.getElementById("traits").value =
          data.personalityTraits?.join(", ") ?? "";

        document.getElementById("impacts").value =
          data.careerImpacts?.join(", ") ?? "";

      } catch (err) {
        console.error(err);
        alert("Không thể tải dữ liệu ngành học!");
        window.location.href = "/majors/index.html";
      }
    }

    loadMajor();


    // Submit cập nhật
    document.getElementById("editForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        jobCategory: document.getElementById("jobCategory").value.trim(),
        description: document.getElementById("description").value.trim(),
        personalityTraits: document.getElementById("traits").value.trim()
          ? document.getElementById("traits").value.split(",").map(t => t.trim())
          : [],
        careerImpacts: document.getElementById("impacts").value.trim()
          ? document.getElementById("impacts").value.split(",").map(i => i.trim())
          : []
      };

      if (!payload.name) {
        alert("Tên ngành không được để trống!");
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert("Cập nhật thành công!");
          window.location.href = "/majors/index.html";
        } else {
          const err = await res.json().catch(() => ({}));
          alert(err.message ?? "Lỗi khi cập nhật ngành!");
        }

      } catch (err) {
        console.error(err);
        alert("Không thể kết nối API!");
      }
    });
  </script>

</body>
</html>
