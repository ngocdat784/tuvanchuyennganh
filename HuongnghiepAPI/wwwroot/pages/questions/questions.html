<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý câu hỏi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f6f8fa;
        }
        .page-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .action-btn {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 14px;
            color: #fff;
        }
        .btn-edit { background: #0d6efd; }
        .btn-delete { background: #dc3545; }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h2 class="page-title">📝 Quản lý câu hỏi</h2>
        <button class="btn btn-success" onclick="openAddModal()">+ Thêm câu hỏi</button>
    </div>

    <!-- ==================== DANH SÁCH CÂU HỎI ==================== -->
    <table class="table table-bordered mt-4 table-striped">
        <thead class="table-dark">
            <tr>
                <th style="width:60px;">ID</th>
                <th>Nội dung</th>
                <th>Nhóm</th>
                <th style="width:100px;">Thứ tự</th>
                <th style="width:150px;">Hành động</th>
            </tr>
        </thead>
        <tbody id="questionTable">
            <!-- Render bằng JS -->
        </tbody>
    </table>
</div>


<!-- ========================================================= -->
<!-- 🟢 MODAL THÊM CÂU HỎI -->
<!-- ========================================================= -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Thêm câu hỏi</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label>Nội dung câu hỏi</label>
                <textarea id="addText" class="form-control"></textarea>

                <label class="mt-2">Nhóm câu hỏi</label>
                <select id="addGroup" class="form-control"></select>

                <label class="mt-2">Thứ tự</label>
                <input id="addOrder" type="number" class="form-control">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button class="btn btn-success" onclick="createQuestion()">Lưu</button>
            </div>

        </div>
    </div>
</div>


<!-- ========================================================= -->
<!-- 🔵 MODAL SỬA CÂU HỎI -->
<!-- ========================================================= -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Chỉnh sửa câu hỏi</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editId">

                <label>Nội dung câu hỏi</label>
                <textarea id="editText" class="form-control"></textarea>

                <label class="mt-2">Nhóm câu hỏi</label>
                <select id="editGroup" class="form-control"></select>

                <label class="mt-2">Thứ tự</label>
                <input id="editOrder" type="number" class="form-control">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button class="btn btn-primary" onclick="updateQuestion()">Cập nhật</button>
            </div>

        </div>
    </div>
</div>


<!-- ========================================================= -->
<!-- 🔴 MODAL XÓA CÂU HỎI -->
<!-- ========================================================= -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Xác nhận xóa</h5>
            </div>

            <div class="modal-body">
                <p>Bạn có chắc chắn muốn xóa câu hỏi này?</p>
                <strong id="deleteQuestionText"></strong>
                <input type="hidden" id="deleteId">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button class="btn btn-danger" onclick="deleteQuestion()">Xóa</button>
            </div>

        </div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_Q = "http://localhost:5086/api/questions";
const API_G = "http://localhost:5086/api/questiongroup";


// ======================= LOAD NHÓM CHO DROPDOWN =======================
async function loadGroupsToDropdown(selectId) {
    const res = await fetch(API_G);
    const groups = await res.json();

    const select = document.getElementById(selectId);
    select.innerHTML = "";

    groups.forEach(g => {
        select.innerHTML += `<option value="${g.questionGroupId}">${g.title}</option>`;
    });
}


// ======================= LOAD DANH SÁCH CÂU HỎI =======================
async function loadQuestions() {
    const res = await fetch(API_Q);
    const data = await res.json();

    const tbody = document.getElementById("questionTable");
    tbody.innerHTML = "";

    data.forEach(q => {
        tbody.innerHTML += `
            <tr>
                <td>${q.questionId}</td>
                <td>${q.text}</td>
                <td>${q.questionGroup?.title || "—"}</td>
                <td>${q.order}</td>
                <td>
                    <span class="action-btn btn-edit" onclick="openEditModal(${q.questionId})">Sửa</span>
                    <span class="action-btn btn-delete" onclick="openDeleteModal(${q.questionId}, '${q.text.replace(/'/g, "\\'")}')">Xóa</span>
                </td>
            </tr>
        `;
    });
}

loadQuestions();


// ======================= THÊM CÂU HỎI =======================
async function openAddModal() {
    await loadGroupsToDropdown("addGroup");
    new bootstrap.Modal(document.getElementById("addModal")).show();
}

async function createQuestion() {

    const question = {
        text: document.getElementById("addText").value,
        order: Number(document.getElementById("addOrder").value),
        questionGroupId: Number(document.getElementById("addGroup").value)
    };

    await fetch(API_Q, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(question)
    });

    loadQuestions();
    bootstrap.Modal.getInstance(document.getElementById("addModal")).hide();
}


// ======================= SỬA CÂU HỎI =======================
async function openEditModal(id) {

    const res = await fetch(`${API_Q}/${id}`);
    const q = await res.json();

    document.getElementById("editId").value = q.questionId;
    document.getElementById("editText").value = q.text;
    document.getElementById("editOrder").value = q.order;

    await loadGroupsToDropdown("editGroup");
    document.getElementById("editGroup").value = q.questionGroupId;

    new bootstrap.Modal(document.getElementById("editModal")).show();
}

async function updateQuestion() {

    const id = document.getElementById("editId").value;

    const updated = {
        text: document.getElementById("editText").value,
        order: Number(document.getElementById("editOrder").value),
        questionGroupId: Number(document.getElementById("editGroup").value)
    };

    await fetch(`${API_Q}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updated)
    });

    loadQuestions();
    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
}


// ======================= XÓA CÂU HỎI =======================
function openDeleteModal(id, text) {
    document.getElementById("deleteId").value = id;
    document.getElementById("deleteQuestionText").innerText = text;

    new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

async function deleteQuestion() {

    const id = document.getElementById("deleteId").value;

    await fetch(`${API_Q}/${id}`, { method: "DELETE" });

    loadQuestions();
    bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
}

</script>

</body>
</html>
