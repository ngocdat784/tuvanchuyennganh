<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tư vấn viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f6f8fa; }
        .page-title { font-size: 26px; font-weight: bold; margin-bottom: 25px; }
        .action-btn { cursor: pointer; padding: 5px 10px; border-radius: 6px; font-size: 14px; color: #fff; }
        .btn-edit { background: #0d6efd; }
        .btn-delete { background: #dc3545; }
        .profile-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h2 class="page-title">👨‍⚕️ Quản lý tư vấn viên</h2>
        <button class="btn btn-success" onclick="openAddModal()">+ Thêm tư vấn viên</button>
    </div>

    <!-- ==================== BẢNG DANH SÁCH TƯ VẤN VIÊN ==================== -->
    <table class="table table-bordered table-striped mt-4">
        <thead class="table-dark">
            <tr>
                <th style="width: 60px;">ID</th>
                <th>Ảnh</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Chuyên môn</th>
                <th style="width: 140px;">Hành động</th>
            </tr>
        </thead>
        <tbody id="counselorTable">
            <!-- Render từ JS -->
        </tbody>
    </table>
</div>

<!-- ================================================================= -->
<!-- 🟢 MODAL THÊM TƯ VẤN VIÊN -->
<!-- ================================================================= -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Thêm tư vấn viên</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <!-- ❌ HIỂN THỊ LỖI -->
                <div id="addError" class="alert alert-danger d-none"></div>

                <label class="form-label">Tên</label>
                <input id="addName" class="form-control">

                <label class="form-label mt-2">Email</label>
                <input id="addEmail" class="form-control">

                <label class="form-label mt-2">Mật khẩu</label>
                <input id="addPassword" type="password" class="form-control">

                <label class="form-label mt-2">Chuyên môn</label>
                <input id="addSpecialty" class="form-control">

                <label class="form-label mt-2">Ảnh đại diện</label>
                <input id="addImage" type="file" class="form-control">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button class="btn btn-success" onclick="createCounselor()">Lưu</button>
            </div>

        </div>
    </div>
</div>



<!-- ================================================================= -->
<!-- 🔵 MODAL SỬA TƯ VẤN VIÊN -->
<!-- ================================================================= -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Sửa tư vấn viên</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editId">

                <label class="form-label">Tên</label>
                <input id="editName" class="form-control">

                <label class="form-label mt-2">Email</label>
                <input id="editEmail" class="form-control">

                <label class="form-label mt-2">Chuyên môn</label>
                <input id="editSpecialty" class="form-control">

                <label class="form-label mt-2">Ảnh mới (tuỳ chọn)</label>
                <input id="editImage" type="file" class="form-control">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button class="btn btn-primary" onclick="updateCounselor()">Cập nhật</button>
            </div>

        </div>
    </div>
</div>



<!-- ================================================================= -->
<!-- 🔴 MODAL XOÁ -->
<!-- ================================================================= -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Xóa tư vấn viên</h5>
            </div>

            <div class="modal-body">
                <p>Bạn chắc chắn muốn xóa?</p>
                <strong id="deleteName"></strong>
                <input id="deleteId" type="hidden">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button class="btn btn-danger" onclick="deleteCounselor()">Xóa</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API = "http://localhost:5086/api/counselor";
const TOKEN = localStorage.getItem("token");

async function loadCounselors() {
    const res = await fetch(API, {
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    const data = await res.json();
    const tbody = document.getElementById("counselorTable");
    tbody.innerHTML = "";

    data.forEach(c => {
        tbody.innerHTML += `
        <tr>
            <td>${c.counselorId}</td>
            <td>
                <img src="${c.imageUrl ?? '/images/default.png'}"
                     style="width:45px;height:45px;border-radius:50%;object-fit:cover;">
            </td>
            <td>${c.fullName}</td>
            <td>${c.email}</td>
            <td>${c.details ?? ""}</td>
            <td>
                <span class="action-btn btn-delete"
                      onclick="openDeleteModal(${c.counselorId}, '${c.fullName}')">Xóa</span>
            </td>
        </tr>`;
    });
}

loadCounselors();




// ======================================================================
// 🟩 2) THÊM TƯ VẤN VIÊN
// ======================================================================
function openAddModal() {
    new bootstrap.Modal(document.getElementById("addModal")).show();
}

async function createCounselor() {
    const errorBox = document.getElementById("addError");
    errorBox.classList.add("d-none");
    errorBox.innerText = "";

    const form = new FormData();
    form.append("fullName", document.getElementById("addName").value);
    form.append("email", document.getElementById("addEmail").value);
    form.append("password", document.getElementById("addPassword").value);
    form.append("details", document.getElementById("addSpecialty").value);

    const img = document.getElementById("addImage").files[0];
    if (img) form.append("image", img);

    try {
        const res = await fetch(`${API}/register`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${TOKEN}`
            },
            body: form
        });

        const raw = await res.text();

        if (!res.ok) {
            errorBox.innerText = raw;
            errorBox.classList.remove("d-none");
            return;
        }

        loadCounselors();
        bootstrap.Modal.getInstance(
            document.getElementById("addModal")
        ).hide();

    } catch (err) {
        errorBox.innerText = `❌ Không thể kết nối server: ${err.message}`;
        errorBox.classList.remove("d-none");
        console.error(err);
    }
}




async function updateCounselor() {
    const id = document.getElementById("editId").value;

    const updated = {
        counselorId: id,
        fullName: document.getElementById("editName").value,
        email: document.getElementById("editEmail").value,
        details: document.getElementById("editSpecialty").value
    };

    try {
        const res = await fetch(`${API}/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${TOKEN}`
            },
            body: JSON.stringify(updated)
        });

        const raw = await res.text();

        if (!res.ok) {
            alert(raw);
            return;
        }

        // 🖼️ Nếu có ảnh mới → upload
        const img = document.getElementById("editImage").files[0];
        if (img) {
            const form = new FormData();
            form.append("file", img);

            await fetch(`${API}/${id}/upload-image`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${TOKEN}`
                },
                body: form
            });
        }

        loadCounselors();
        bootstrap.Modal
            .getInstance(document.getElementById("editModal"))
            .hide();

    } catch (err) {
        alert("❌ Lỗi kết nối server");
        console.error(err);
    }
}





function openDeleteModal(id, fullName) {
    document.getElementById("deleteId").value = id;
    document.getElementById("deleteName").innerText = fullName;

    new bootstrap.Modal(document.getElementById("deleteModal")).show();
}


async function deleteCounselor() {
    const id = document.getElementById("deleteId").value;

    await fetch(`${API}/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${TOKEN}`
        }
    });

    loadCounselors();
    bootstrap.Modal.getInstance(
        document.getElementById("deleteModal")
    ).hide();
}


</script>

</body>
</html>
