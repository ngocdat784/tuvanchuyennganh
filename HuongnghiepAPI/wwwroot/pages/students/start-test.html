<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài kiểm tra định hướng ngành</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<style>
   /* =======================
   TỔNG THỂ
======================= */
body {
    background: #eef6f6;
}

/* =======================
   CARD CHÍNH
======================= */
.container.main-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0, 150, 160, 0.18);
}

/* =======================
   ACCOUNT BAR
======================= */
.account-bar {
    position: absolute;
    top: 20px;
    right: 25px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.account-bar strong {
    font-size: 14px;
    color: #006d75;
}

/* =======================
   ERROR BOX
======================= */
.error-box {
    display: none;
    margin: 16px auto;
    padding: 10px 14px;
    border-radius: 8px;
    background: #ffebee;
    color: #c62828;
    font-weight: 500;
    max-width: 500px;
    text-align: center;
}

/* =======================
   TIÊU ĐỀ + NÚT BẮT ĐẦU
======================= */
h2 {
    text-align: center;
    font-weight: 700;
    color: #0097a7;
    margin-bottom: 25px;
}

/* Nút bắt đầu */
#startTestBtn {
    display: block;
    margin: 0 auto 20px;
    padding: 14px 42px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 999px;
    background: linear-gradient(135deg, #26d7de, #18b6bf);
    border: none;
    color: #003b40;
    box-shadow: 0 8px 24px rgba(0, 180, 190, 0.4);
    transition: 0.3s;
}

#startTestBtn:hover {
    transform: scale(1.07);
}

/* =======================
   CARD CÂU HỎI
======================= */
#questionBox {
    margin-top: 30px;
}

#questionTitle {
    font-size: 22px;
    font-weight: 600;
    color: #007b83;
    margin-bottom: 22px;
    text-align: center;
}

/* =======================
   GRID ĐÁP ÁN (4 CARD)
======================= */
#answerList,
.answer-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}

/* CARD ĐÁP ÁN */
#answerList label,
.answer-grid label {
    position: relative;
    padding: 20px 18px;
    border-radius: 14px;
    background: #f6fcfd;
    border: 2px solid #d9f3f4;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.25s ease;
}

/* Ẩn radio */
#answerList input[type="radio"],
.answer-grid input {
    display: none;
}

/* Hover */
#answerList label:hover,
.answer-grid label:hover {
    background: #e0f4f6;
    border-color: #00a6a6;
}

/* Khi được chọn */
#answerList input[type="radio"]:checked + span,
.answer-grid input:checked + span {
    color: #004d40;
    font-weight: 700;
}

/* Card khi checked */
#answerList label:has(input[type="radio"]:checked),
.answer-grid label:has(input:checked) {
    background: linear-gradient(135deg, #26d7de, #18b6bf);
    color: #003b40;
    border-color: #0097a7;
    box-shadow: 0 6px 20px rgba(0, 150, 160, 0.35);
    transform: scale(1.03);
}

/* =======================
   NÚT ĐIỀU HƯỚNG
======================= */
#prevBtn,
#nextBtn,
#finishBtn {
    border-radius: 999px;
    padding: 10px 28px;
    font-weight: 600;
    border: none;
}

#prevBtn {
    background: #b0bec5;
}

#nextBtn {
    background: #00bcd4;
    color: #003b40;
}

#finishBtn {
    background: linear-gradient(135deg, #4caf50, #2e7d32);
}

/* =======================
   RESPONSIVE
======================= */
@media (max-width: 768px) {
    #answerList,
    .answer-grid {
        grid-template-columns: 1fr;
    }

    .account-bar {
        position: static;
        justify-content: flex-end;
        margin-bottom: 15px;
    }
}


</style>
<body class="p-4">

<div class="container main-card">

    <!-- 🔵 THANH TÀI KHOẢN (GỘP CHUNG CARD) -->
    <div id="accountBox" class="account-bar">
        <div class="text-end">
            <strong id="accName"></strong>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
            Đăng xuất
        </button>
    </div>

    <!-- 🧠 TIÊU ĐỀ -->
    <h2 class="text-center mb-4">Bài kiểm tra định hướng ngành</h2>

    <!-- ▶️ NÚT BẮT ĐẦU -->
    <div class="text-center">
        <button id="startTestBtn" class="btn btn-primary px-4 py-2">
            Bắt đầu bài test
        </button>
    </div>

    <!-- ❌ THÔNG BÁO LỖI -->
    <div id="errorBox" class="error-box"></div>

    <!-- ❓ KHUNG CÂU HỎI -->
    <div id="questionBox" class="d-none mt-4">

        <h4 id="questionTitle" class="text-center mb-4"></h4>

        <!-- 🧩 ĐÁP ÁN -->
        <div id="answerList" class="answer-grid"></div>

        <!-- 🔁 ĐIỀU HƯỚNG -->
        <div class="mt-4 d-flex justify-content-between">
            <button id="prevBtn" class="btn btn-secondary">⬅ Trước</button>
            <button id="nextBtn" class="btn btn-primary">Tiếp ➜</button>
            <button id="finishBtn" class="btn btn-success d-none">🎉 Hoàn thành</button>
        </div>
    </div>

    <!-- 🎉 KẾT QUẢ -->
    <div id="finishBox" class="d-none mt-4 text-center">
        <h3>Bài test đã hoàn thành!</h3>
        <p>Kết quả của bạn đang được tính toán...</p>
    </div>

</div>



<!-- ==========================================
     🔶 MODAL ĐĂNG XUẤT
=========================================== -->
<div class="modal fade" id="logoutModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title">Xác nhận đăng xuất</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">Bạn có chắc chắn muốn đăng xuất không?</div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Không</button>
                <button class="btn btn-danger" id="confirmLogout">Đăng xuất</button>
            </div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_BASE = "http://localhost:5086/api";
const token = localStorage.getItem("token");
const studentId = localStorage.getItem("studentId");
const studentName = localStorage.getItem("fullName");
const role = localStorage.getItem("role");

const accountBox = document.getElementById("accountBox");
const accName = document.getElementById("accName");
const logoutBtn = document.getElementById("logoutBtn");

if (!token || !studentName) {
    accountBox.style.display = "none";
} else {
    let roleLabel = "";

    switch ((role || "").toLowerCase()) {
        case "admin":
            roleLabel = "Quản trị viên";
            break;
        case "counselor":
            roleLabel = "Chuyên viên tư vấn";
            break;
        default:
            roleLabel = "Học sinh";
    }

    accName.innerHTML = `
        Xin chào, <strong>${studentName}</strong><br>
        <small class="text-muted">(${roleLabel})</small>
    `;
}


// ==========================================
// 1. BIẾN TOÀN CỤC
// ==========================================
let questions = [];
let currentIndex = 0;
let testResultId = null;
let answers = {}; // lưu đáp án đã chọn {questionId: answerId}


// ==========================================
// 2. BẮT ĐẦU BÀI TEST (ĐÃ CẬP NHẬT CHUẨN JWT)
// ==========================================
startTestBtn.onclick = async () => {
    const errorBox = document.getElementById("errorBox");
    errorBox.style.display = "none";
    errorBox.innerText = "";

    if (!token) {
        errorBox.style.display = "block";
        errorBox.innerText = "❌ Bạn chưa đăng nhập.";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/tests/start`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`
                // ✅ KHÔNG cần Content-Type vì không gửi body
            }
            // ✅ KHÔNG gửi body
        });

        if (!res.ok) {
            const errText = await res.text();
            errorBox.style.display = "block";
            errorBox.innerText =
                `❌ Lỗi ${res.status}: ${errText || "Không xác định"}`;
            return;
        }

        const data = await res.json();
        testResultId = data.testResultId;

        // Bắt đầu tải câu hỏi
        loadQuestions();

    } catch (err) {
        errorBox.style.display = "block";
        errorBox.innerText = "❌ Lỗi kết nối: " + err.message;
    }
};




// ==========================================
// 3. LOAD CÂU HỎI (GIỮ NGUYÊN)
// ==========================================
async function loadQuestions() {
    const res = await fetch(`${API_BASE}/questions`);
    questions = await res.json();

    if (!questions.length) return alert("Không có câu hỏi nào!");

    currentIndex = 0;
    startTestBtn.classList.add("d-none");
    questionBox.classList.remove("d-none");

    showQuestion();
}



// ==========================================
// 2. HIỂN THỊ CÂU HỎI
// ==========================================
async function showQuestion() {
    const q = questions[currentIndex];

    questionTitle.innerText = q.title || q.text;

    // Lấy danh sách đáp án từ API
    const res = await fetch(`${API_BASE}/answers/question/${q.questionId}`);
    const list = await res.json();

    answerList.innerHTML = "";
    list.forEach(a => {
        answerList.innerHTML += `
            <label>
    <input type="radio" name="answer" value="${a.answerId}">
    <span>${a.text ?? a.answerText ?? a.content}</span>
</label>

        `;
    });

    // 🔄 Khôi phục đáp án đã chọn
    if (answers[q.questionId]) {
        document.querySelector(`input[value="${answers[q.questionId]}"]`)?.click();
    }

    // 🧷 Lưu khi chọn đáp án
    document.querySelectorAll("input[name='answer']").forEach(r => {
        r.onchange = () => {
            answers[q.questionId] = +r.value;
            updateButtons();
        };
    });

    updateButtons();
}



// ==========================================
// 3. NÚT TRƯỚC
// ==========================================
prevBtn.onclick = () => {
    if (currentIndex === 0) return;
    currentIndex--;
    showQuestion();
};



// ==========================================
// 4. NÚT TIẾP THEO
// ==========================================
nextBtn.onclick = async () => {
    const q = questions[currentIndex];

    if (!answers[q.questionId])
        return alert("Hãy chọn đáp án!");

    // Gửi đáp án lên API
    await fetch(`${API_BASE}/tests/answer`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            testResultId,
            questionId: q.questionId,
            answerId: answers[q.questionId]
        })
    });

    currentIndex++;

    if (currentIndex < questions.length)
        showQuestion();
};



// ==========================================
// 5. HOÀN THÀNH
// ==========================================
finishBtn.onclick = async () => {
    if (Object.keys(answers).length !== questions.length)
        return alert("⚠ Bạn chưa trả lời hết câu!");

    await finishTest();
};



// ==========================================
// 6. QUẢN LÝ 3 NÚT
// ==========================================
function updateButtons() {
    // Nút Trước
    prevBtn.style.display = currentIndex === 0
        ? "none" : "inline-block";

    // Nút Sau
    nextBtn.style.display = currentIndex === questions.length - 1
        ? "none" : "inline-block";

    // Nút Hoàn thành
    if (Object.keys(answers).length === questions.length) {
        finishBtn.classList.remove("d-none");
    } else {
        finishBtn.classList.add("d-none");
    }
}

async function finishTest() {
    const box = document.getElementById("questionBox");
    const finish = document.getElementById("finishBox");

    box.classList.add("d-none");
    finish.classList.remove("d-none");
    finish.innerHTML = `<h3>⏳ Đang xử lý kết quả...</h3>`;

    try {
        // ==========================
        // 1️⃣ GỬI YÊU CẦU TÍNH ĐIỂM
        // ==========================
        await fetch(`${API_BASE}/tests/finish`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(testResultId)
        });

        // ==========================
        // 2️⃣ LẤY KẾT QUẢ ĐIỂM
        // ==========================
        const res = await fetch(`${API_BASE}/tests/result/${testResultId}`);
        const scores = await res.json();

        if (!Array.isArray(scores) || scores.length === 0) {
            finish.innerHTML = `<h3>❗ Không tìm thấy kết quả.</h3>`;
            return;
        }

        scores.sort((a, b) => b.score - a.score);

        // Lưu ngành top
        localStorage.setItem("topMajor", scores[0].major.name);
        localStorage.setItem("topMajorId", scores[0].major.majorId || scores[0].major.id);

        // ==========================
        // 3️⃣ UI KẾT QUẢ + BIỂU ĐỒ
        // ==========================
        finish.innerHTML = `
            <h3>🎉 Kết quả bài test của bạn</h3>
            <p><b>Thí sinh:</b> ${studentName}</p>

            <div class="alert alert-success mt-3">
                🏆 <b>Ngành phù hợp nhất:</b>
                <span style="color:#d63384;">${scores[0].major.name}</span>
                (${scores[0].score} điểm)
            </div>

            <h5 class="mt-4">📊 Biểu đồ mức độ phù hợp</h5>
            <canvas id="majorChart" height="120"></canvas>

            <hr>
            <h4>📌 Thông tin chi tiết các ngành</h4>
            <div id="majorTableBox"></div>
        `;

        // ==========================
        // 4️⃣ VẼ BIỂU ĐỒ
        // ==========================
        const ctx = document.getElementById("majorChart").getContext("2d");

        new Chart(ctx, {
            type: "bar",
            data: {
                labels: scores.map(s => s.major.name),
                datasets: [{
                    data: scores.map(s => s.score),
                    backgroundColor: scores.map((_, i) =>
                        i === 0 ? "#ff6384" : "#36a2eb"
                    ),
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // ==========================
        // 5️⃣ LẤY DANH SÁCH NGÀNH + TỐ CHẤT
        // ==========================
        const majorListRes = await fetch(`${API_BASE}/major`);
        const majorRaw = await majorListRes.json();

        // ⚠️ Chuẩn hoá dữ liệu
        const majors = Array.isArray(majorRaw)
            ? majorRaw
            : majorRaw.data;

        if (!Array.isArray(majors)) {
            document.getElementById("majorTableBox").innerHTML =
                `<p class="text-danger">Không thể tải danh sách ngành.</p>`;
            return;
        }

        // ==========================
        // 6️⃣ RENDER BẢNG
        // ==========================
        const rows = majors.map(m => {
            const traits = Array.isArray(m.majorTraits) && m.majorTraits.length
                ? `<ul>${m.majorTraits.map(t => `<li>${t.title}</li>`).join("")}</ul>`
                : "<i>Chưa có dữ liệu</i>";

            return `
                <tr>
                    <td><b>${m.name}</b></td>
                    <td>${traits}</td>
                    <td>${m.description || "<i>Chưa có mô tả</i>"}</td>
                </tr>
            `;
        }).join("");

        document.getElementById("majorTableBox").innerHTML = `
            <table class="table table-bordered mt-3">
                <thead class="table-light">
                    <tr>
                        <th>Tên ngành</th>
                        <th>Tố chất phù hợp</th>
                        <th>Mô tả</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>

            <button class="btn btn-primary mt-3"
                onclick="location.href='Roadmap.html'">
                Xem lộ trình học tập
            </button>
        `;
    }
    catch (err) {
        console.error(err);
        finish.innerHTML = `<h3>⚠ Có lỗi xảy ra. Vui lòng thử lại.</h3>`;
    }
}







// ==========================================
// 7. ĐĂNG XUẤT
// ==========================================
document.getElementById("logoutBtn").onclick = () => {
    new bootstrap.Modal(document.getElementById("logoutModal")).show();
};

document.getElementById("confirmLogout").onclick = () => {
    localStorage.clear();
    window.location.href = "http://localhost:5086/index.html";
};

</script>

</body>
</html>
