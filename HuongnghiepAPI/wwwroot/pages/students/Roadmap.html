<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộ trình học tập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f7f7f7; padding-bottom: 50px; }
        .stage-box { border-left: 5px solid #0d6efd; background: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .item-box { padding: 12px; border-radius: 8px; background: #eef5ff; margin-bottom: 12px; }
        .skill-tag { background: #0d6efd; color: white; padding: 3px 8px; border-radius: 5px; margin-right: 5px; font-size: 13px; }
    </style>
</head>

<body>

<!-- ================================
     🔵 THANH TRẠNG THÁI USER
================================ -->
<div class="container mt-3 d-flex justify-content-end">
    <div id="accountBox">
        <strong id="accName"></strong>
        <button class="btn btn-outline-danger btn-sm ms-2" id="logoutBtn">Đăng xuất</button>
    </div>
</div>

<div class="container mt-4">
    <h2 class="text-center mb-3">📘 Lộ trình học tập theo ngành</h2>
    <p id="loading" class="text-center">⏳ Đang tải dữ liệu lộ trình...</p>

    <div id="roadmapContainer" class="mt-3"></div>

    <div class="text-center mt-4 d-flex justify-content-center gap-3">
        <!-- Nút quay lại -->
        <button class="btn btn-secondary" onclick="history.back()">⬅ Quay lại</button>
        <a href="university.html"
   class="btn btn-success px-4">
    🎓 Gợi ý trường đại học phù hợp
</a>


        <!-- Nút về trang chủ -->
       <a href="/index.html" class="btn btn-primary">🏠 Về trang chủ</a>
    </div>
</div>


<script>
   /* =====================================================
   🔐 KIỂM TRA ĐĂNG NHẬP + LẤY THÔNG TIN USER
===================================================== */

const token = localStorage.getItem("token");
const studentId = localStorage.getItem("studentId");
const studentName = localStorage.getItem("fullName");
const role = localStorage.getItem("role");

const accountBox = document.getElementById("accountBox");
const accName = document.getElementById("accName");
const logoutBtn = document.getElementById("logoutBtn");

// ❌ CHƯA ĐĂNG NHẬP
if (!token || !studentName || !role) {
    alert("⚠️ Bạn chưa đăng nhập!");
    window.location.href = "/pages/students/login.html";
}

// ✅ CHỈ CHO PHÉP HỌC SINH
if (role.toLowerCase() !== "student") {
    alert("⛔ Chỉ học sinh mới được phép truy cập!");
    window.location.href = "/index.html";
}

/* =====================================================
   👤 HIỂN THỊ TÊN + ROLE
===================================================== */

if (accountBox && accName) {
    let roleLabel = "";

    switch (role.toLowerCase()) {
        case "admin":
            roleLabel = "Quản trị viên";
            break;
        case "counselor":
            roleLabel = "Chuyên viên tư vấn";
            break;
        default:
            roleLabel = "Học sinh";
    }

    accountBox.style.display = "block";

    accName.innerHTML = `
        Xin chào, <strong>${studentName}</strong><br>
        <small class="text-muted">(${roleLabel})</small>
    `;
}

/* =====================================================
   🚪 LOGOUT
===================================================== */

logoutBtn?.addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "/pages/students/login.html";
});




/* =====================================================
   2️⃣ LẤY MAJOR ID
===================================================== */
const API_BASE = "http://localhost:5086/api";
const urlParams = new URLSearchParams(window.location.search);
let majorId = urlParams.get("majorId") || localStorage.getItem("topMajorId");

if (!majorId) {
    document.getElementById("loading").innerHTML =
        "❗ Không xác định được ngành. Hãy quay lại trang kết quả.";
    throw new Error("Missing majorId");
}

/* =====================================================
   3️⃣ LOAD ROADMAP
===================================================== */
async function loadRoadmap() {
    try {
        const url = `${API_BASE}/roadmap/major/${majorId}`;
        const loadingEl = document.getElementById("loading");

        loadingEl.innerHTML = `⏳ Đang tải lộ trình từ: <code>${url}</code>`;

        const res = await fetch(url);

        if (!res.ok) {
            let errorText = await res.text();
            loadingEl.innerHTML = `
                <div class="alert alert-danger mt-3">
                    <h5>❌ Lỗi API (${res.status})</h5>
                    <p><b>URL:</b> ${url}</p>
                    <pre>${errorText}</pre>
                </div>`;
            return;
        }

        let data = await res.json();

        if (data.message) {
            loadingEl.innerHTML = `
                <div class="alert alert-warning mt-3">⚠ ${data.message}</div>`;
            return;
        }

        renderRoadmap(data);
    }
    catch (err) {
        document.getElementById("loading").innerHTML = `
            <div class="alert alert-danger mt-3">
                <h5>⚠ Lỗi JavaScript</h5>
                <pre>${err.stack || err}</pre>
            </div>`;
    }
}

/* =====================================================
   4️⃣ RENDER ROADMAP
===================================================== */
function renderRoadmap(roadmap) {
    document.getElementById("loading").classList.add("d-none");
    const container = document.getElementById("roadmapContainer");

    let html = `
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h3>${roadmap.title}</h3>
                <p class="text-muted">${roadmap.description || ""}</p>
                <span class="badge bg-primary">Ngành: ${roadmap.major?.name}</span>
            </div>
        </div>
    `;

    roadmap.stages
        ?.sort((a, b) => a.stageOrder - b.stageOrder)
        .forEach(stage => {
            html += `
            <div class="stage-box shadow-sm">
                <h4>🔵 Giai đoạn ${stage.stageOrder}: ${stage.stageTitle}</h4>
                <p>${stage.stageDescription || ""}</p>
                <div class="mt-3">
            `;

            stage.items
                ?.sort((a, b) => a.itemOrder - b.itemOrder)
                .forEach(item => {
                    html += `
                    <div class="item-box">
                        <h6>• ${item.itemOrder}. ${item.itemTitle}</h6>
                        <p>${item.content || ""}</p>
                    `;

                    if (item.skills?.length > 0) {
                        html += `<div class="mb-2">`;
                        item.skills.forEach(s => {
                            html += `<span class="skill-tag">${s.skillName}</span>`;
                        });
                        html += `</div>`;
                    }

                    if (item.resourceLink) {
                        html += `
                            <a href="${item.resourceLink}" target="_blank"
                                class="btn btn-sm btn-outline-primary mt-1">Tài liệu tham khảo</a>
                        `;
                    }

                    html += `</div>`;
                });

            html += `</div></div>`;
        });

    container.innerHTML = html;
}

loadRoadmap();
</script>

</body>
</html>
