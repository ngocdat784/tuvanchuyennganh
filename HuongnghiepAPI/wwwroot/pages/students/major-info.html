<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ngành nghề - Love Future</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background:#f5f7fa;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h2 { font-weight: 700; margin-bottom: 20px; }

        .major-card {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: .3s;
            background-size: cover;
            background-position: center;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .major-card:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        /* Phần mờ xanh + chữ */
        .major-text {
            position: absolute;
            width:100%;
            height:60px;
            background: rgba(0, 137, 153, 0.8);
            bottom:0;
            left:0;
            color:#fff;
            font-size:22px;
            font-weight:bold;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        #majorList {
            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
            margin-top:25px;
        }
    </style>
</head>
<body>

    <h2>📘 Danh sách ngành nghề</h2>
    <p>Khám phá ngành học phù hợp với bạn cùng Love Future.</p>

    <div id="loading" class="alert alert-info">⏳ Đang tải dữ liệu...</div>

    <!-- Danh sách cards ngành -->
    <div id="majorList" class="d-none"></div>

<script>
    const API_BASE = "http://localhost:5086/api";

    async function loadMajors() {
        try {
            const res = await fetch(`${API_BASE}/major`);
            const majors = await res.json();

            if (!majors.length) {
                document.getElementById("loading").innerHTML = "⚠ Chưa có ngành nào!";
                return;
            }

            document.getElementById("loading").classList.add("d-none");
            document.getElementById("majorList").classList.remove("d-none");

            document.getElementById("majorList").innerHTML = majors.map(m => `
                <div class="major-card"
                    style="background-image:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=900&q=60')"
                    onclick="openMajor(${m.majorId})">

                    <div class="major-text">${m.name}</div>
                </div>
            `).join("");

        } catch (e) {
            document.getElementById("loading").innerHTML = "❌ Lỗi tải dữ liệu!";
            console.log(e);
        }
    }

    function openMajor(id) {
    window.location.href = `/pages/students/major-details.html?id=${id}`;
}

    loadMajors();
</script>

</body>
</html>
