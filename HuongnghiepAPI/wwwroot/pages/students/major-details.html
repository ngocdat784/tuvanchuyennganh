<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết ngành học - Love Future</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #eef2f5;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .container-box {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.10);
            line-height: 1.6;
        }

        #majorName {
            font-size: 28px;
            font-weight: 700;
            color:#008999;
            margin-bottom: 5px;
        }

        #majorDescription {
            font-size: 18px;
            margin-bottom: 18px;
            color:#333;
        }

        #majorDetails {
            font-size: 17px;
            margin-top: 12px;
            white-space: pre-line;
        }

        #loading {
            font-size:17px;
            padding:10px;
        }
    </style>
</head>

<body>
    
    <div class="container-box">
        <div id="loading" class="alert alert-info">⏳ Đang tải dữ liệu ngành...</div>

        <h2 id="majorName" class="d-none"></h2>
        <p id="majorDescription" class="d-none"></p>
        <div id="majorDetails" class="d-none"></div>

        <button onclick="history.back()" class="btn btn-secondary mt-4">⬅ Quay lại</button>
    </div>


<script>
    const API_BASE = "http://localhost:5086/api";
    const id = new URLSearchParams(window.location.search).get("id");

    loadMajorDetails();

    async function loadMajorDetails() {
        try {
            const res = await fetch(`${API_BASE}/major/${id}`);
            if (!res.ok) {
                document.getElementById("loading").innerHTML = "❌ Không tìm thấy ngành!";
                return;
            }

            const major = await res.json();

            document.getElementById("loading").classList.add("d-none");

            document.getElementById("majorName").textContent = major.name || "Tên ngành không có";
            document.getElementById("majorDescription").textContent = major.description || "Chưa có mô tả ngành.";
            document.getElementById("majorDetails").textContent = major.details || "Chưa có nội dung chi tiết.";

            document.getElementById("majorName").classList.remove("d-none");
            document.getElementById("majorDescription").classList.remove("d-none");
            document.getElementById("majorDetails").classList.remove("d-none");

        } catch (err) {
            document.getElementById("loading").innerHTML = "❌ Lỗi tải dữ liệu!";
            console.error(err);
        }
    }
</script>

</body>
</html>
