<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gợi ý trường đại học</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f6f8fa;
            padding-bottom: 50px;
        }
        .uni-card {
            border-radius: 12px;
            transition: all 0.25s ease;
        }
        .uni-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,.08);
        }
        .major-badge {
            background: #0d6efd;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            margin: 3px;
            display: inline-block;
        }
    </style>
</head>

<body>

<!-- ================================
     🔵 THANH USER
================================ -->
<div class="container mt-3 d-flex justify-content-end">
    <div id="accountBox">
        <strong id="accName"></strong>
        <button class="btn btn-outline-danger btn-sm ms-2" id="logoutBtn">Đăng xuất</button>
    </div>
</div>

<div class="container mt-4">
    <h2 class="text-center mb-2">🎓 Trường đại học phù hợp nhất</h2>
    <p class="text-center text-muted">
        Danh sách các trường phù hợp với <b>ngành bạn đã chọn</b>
    </p>

    <p id="loading" class="text-center mt-4">⏳ Đang tải danh sách trường...</p>

    <div id="universityContainer" class="row mt-4"></div>

    <div class="text-center mt-4">
        <button class="btn btn-secondary" onclick="history.back()">⬅ Quay lại lộ trình</button>
    </div>
</div>

<script>
/* =====================================================
   🔐 KIỂM TRA ĐĂNG NHẬP
===================================================== */
const token = localStorage.getItem("token");
const studentName = localStorage.getItem("fullName");
const role = localStorage.getItem("role");

if (!token || !studentName || !role) {
    alert("⚠️ Bạn chưa đăng nhập!");
    window.location.href = "/pages/students/login.html";
}

if (role.toLowerCase() !== "student") {
    alert("⛔ Chỉ học sinh mới được truy cập!");
    window.location.href = "/index.html";
}

const accName = document.getElementById("accName");
accName.innerHTML = `
    Xin chào, <strong>${studentName}</strong><br>
    <small class="text-muted">(Học sinh)</small>
`;

document.getElementById("logoutBtn").onclick = () => {
    localStorage.clear();
    window.location.href = "/pages/students/login.html";
};

/* =====================================================
   🔗 API + MAJOR ID
===================================================== */
const API_BASE = "http://localhost:5086/api";
const params = new URLSearchParams(window.location.search);

let majorId = params.get("majorId") || localStorage.getItem("topMajorId");

if (!majorId) {
    document.getElementById("loading").innerHTML =
        "❗ Không xác định được ngành. Vui lòng quay lại trang lộ trình.";
    throw new Error("Missing majorId");
}

/* =====================================================
   🎓 LOAD UNIVERSITY
===================================================== */
async function loadUniversities() {
    const url = `${API_BASE}/university/by-major/${majorId}`;
    const loading = document.getElementById("loading");

    try {
        const res = await fetch(url);

        if (!res.ok) {
            const err = await res.text();
            loading.innerHTML = `
                <div class="alert alert-danger">
                    <h5>❌ Lỗi API</h5>
                    <pre>${err}</pre>
                </div>`;
            return;
        }

        const data = await res.json();

        if (!data || data.length === 0) {
            loading.innerHTML = `
                <div class="alert alert-warning">
                    ⚠ Không có trường nào phù hợp với ngành này
                </div>`;
            return;
        }

        renderUniversities(data);
    }
    catch (err) {
        loading.innerHTML = `
            <div class="alert alert-danger">
                <h5>⚠ Lỗi JavaScript</h5>
                <pre>${err.stack || err}</pre>
            </div>`;
    }
}

function renderUniversities(universities) {
    document.getElementById("loading").classList.add("d-none");
    const container = document.getElementById("universityContainer");

    let html = "";

    universities.forEach(u => {
        html += `
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card uni-card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">${u.name}</h5>

                    <p class="text-muted">
                        ${u.description || "Chưa có mô tả"}
                    </p>

                    ${u.location ? `<p><b>📍 Địa điểm:</b> ${u.location}</p>` : ""}
                    
                    ${u.website 
                        ? `<a href="${u.website}" target="_blank" class="btn btn-sm btn-outline-primary mt-2">
                               🌐 Website trường
                           </a>`
                        : ""
                    }
                </div>
            </div>
        </div>
        `;
    });

    container.innerHTML = html;
}



loadUniversities();
</script>

</body>
</html>
