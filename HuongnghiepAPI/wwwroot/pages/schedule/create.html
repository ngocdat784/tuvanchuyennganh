<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm Chuyên Viên Tư Vấn</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #eef6f6;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }

        .btn-submit {
            background: #00a6a6;
            color: white;
            font-weight: bold;
        }

        .btn-submit:hover {
            background: #008585;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="form-container">

        <h3 class="text-center mb-4">Thêm Chuyên Viên Tư Vấn</h3>

        <form id="counselorForm" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" id="fullName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả chuyên môn</label>
                <textarea id="details" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Ảnh đại diện</label>
                <input type="file" id="image" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-submit w-100">Thêm chuyên viên</button>

        </form>

    </div>
</div>

<script>
    const API = "http://localhost:5086/api/Counselor/register";

    document.getElementById("counselorForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData();
        formData.append("fullName", document.getElementById("fullName").value);
        formData.append("email", document.getElementById("email").value);
        formData.append("password", document.getElementById("password").value);
        formData.append("details", document.getElementById("details").value);

        const imageFile = document.getElementById("image").files[0];
        if (imageFile) formData.append("image", imageFile);

        const res = await fetch(API, {
            method: "POST",
            body: formData
        });

        const result = await res.json();

        if (res.ok) {
            alert("Thêm chuyên viên thành công!");
            window.location.href = "index.html";  // ⬅ Chuyển về danh sách ngay
        } else {
            alert("Lỗi: " + (result.message || "Không thể thêm chuyên viên"));
        }
    });
</script>

</body>
</html>
